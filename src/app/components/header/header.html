<section class="header">
  <div class="header__content">
    <div class="header__logo-container" routerLink="/">
      <div class="header__logo-img-cont">
        <img
          src="./assets/jpeg/lev-medvedev.jpg"
          alt="Lev Medvedev Logo"
          class="header__logo-img"
        />
      </div>
      <span class="header__logo-sub">Lev Medvedev</span>
    </div>
    <div class="header__main">
      <ul class="header__links">
        <li class="header__link-wrapper">
          <a href="./" class="header__link"> Home </a>
        </li>
        <li class="header__link-wrapper">
          <a href="./#projects" class="header__link"> Projects </a>
        </li>
        <li class="header__link-wrapper">
          <a href="./#about" class="header__link">About </a>
        </li>
        <li class="header__link-wrapper">
          <a href="./#contact" class="header__link"> Contact </a>
        </li>
      </ul>
      <div class="header__main-ham-menu-cont" (click)="toggleHamMenu()">
        <img
          src="./assets/svg/ham-menu.svg"
          alt="hamburger menu"
          class="header__main-ham-menu"
          [ngClass]="{ 'd-none': IsHamMenuOpen() }"
        />
        <img
          src="./assets/svg/ham-menu-close.svg"
          alt="hamburger menu close"
          class="header__main-ham-menu-close d-none"
          [ngClass]="{ 'd-none': !IsHamMenuOpen() }"
        />
      </div>
    </div>
  </div>
  <div class="header__sm-menu" [ngClass]="{ 'header__sm-menu--active': IsHamMenuOpen() }">
    <div class="header__sm-menu-content">
      <ul class="header__sm-menu-links">
        @for (link of menuLinks; track link.title) {
          <li class="header__sm-menu-link">
            <a [routerLink]="link.link" [fragment]="link.fragment" (click)="closeMenu()">{{ link.title }}</a>
          </li>
        }
        <!-- <li class="header__sm-menu-link">
          <a routerLink="./" (click)="closeMenu()"> Home </a>
        </li>

        <li class="header__sm-menu-link">
          <a href="./#projects" (click)="closeMenu()"> Projects </a>
        </li>

        <li class="header__sm-menu-link">
          <a href="./#about" (click)="closeMenu()"> About </a>
        </li>

        <li class="header__sm-menu-link">
          <a href="./#contact" (click)="closeMenu()"> Contact </a>
        </li> -->
      </ul>
    </div>
  </div>
</section>
